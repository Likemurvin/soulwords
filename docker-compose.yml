version: "3.9"

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db

  api:
    build: ./server
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - MONGO_URL=mongodb://mongo:27017/soulwords
      - PORT=3001
      - BOT_TOKEN=${BOT_TOKEN:-}
      - ALLOW_DEV_AUTH=${ALLOW_DEV_AUTH:-0}
      - MINI_APP_NAME=${MINI_APP_NAME:-1}
    depends_on:
      - mongo

volumes:
  mongo_data:
